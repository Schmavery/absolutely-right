# Unlock order follows mechanical chapters in data/PHASES.md (early → nines).
# Cost rule: later steps on a narrative `requires:` chain cost more (see NARRATIVE_SPINE in validate-data.ts).
# MCP: mcp_tools → always_allow → yolo_mode. Crisis: centaur → code_review → review-of-review → ai_review.

# ── Ch1 early — prompts & basic tests ───────────────────────────────────────
- id: model_update_1
