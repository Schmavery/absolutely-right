# Player actions. Each record colocates the cost, cooldown, event probability,
# formula numbers, and message pools for one action. Game logic in
# `src/game/actions.ts` reads from `ACTION[id]`; UI gates use ids consistent
# with `actionCooldowns` keys.
#
# Cross-cutting numbers (THRESHOLDS, HYPE display thresholds, MONEY, UPTIME,
# STREAMING, save/theme keys, agent buff bug-rate multiplier) remain in
# `src/game/constants.ts`.

- id: prompt
  tokenCost: 7
  cooldownMs: 5000
  # Random events after earlyPromptMsgs; decay see PROMPT_EVENT in constants.ts.
  eventProbability: 0.12
  earlyPromptMsgs:
    - |-
      > build me a startup
      Certainly! I'd be happy to help with that.
    - |-
      > is it running?
      Great question! Let me delve into that for you.
    - |-
      > make no mistakes
      Understood! I'll make no mistakes.
    - |-
      > you just made a mistake
      You're absolutely right. I apologize. I'll make no further mistakes.

- id: kick_agent
  tokenCost: 60
  buffMs: 30000
  eventProbability: 0.2
  introMsg: "Kick off a subagent to get some work done while we get some work done."
  messages:
    - |-
      > kick off an agent
      Agent initialized! It's reading all {{rand 400 1200}} files first, for context. It will begin shortly.
    - |-
      > spawn an agent
      Agent launched! It's spinning up subprocesses and downloading the full repository.
    - |-
      > run the agent
      Agent active! It's opened {{rand 6 21}} tabs and is thinking carefully. Output incoming.
    - |-
      > go agent go
      Agent deployed! It has enabled computer use. I'd rather not say what it clicked.
    - |-
      > agent mode
      Agent running! It refactored {{rand 2 6}} files that weren't part of the task. Very thorough.

- id: paste_error
  tokenCost: 10
  cooldownMs: 4000
  fixChance: 0.5
  baseLocGain: 20
  extraLocRange: 30
  introMsg: "You can paste in an error and I'll try to track down and fix the bug."
  goodMessages:
    - |-
      > why is this failing
      I see the issue — it was an off-by-one error. Here's the corrected version.
    - |-
      > here's the stack trace
      Got it. The root cause was a missing null check. Fixed — should be cleaner now.
    - |-
      > it keeps crashing
      I've identified the issue. It was the code I wrote last session. Corrected.
    - |-
      > same error again
      I see the problem — I was importing the wrong module. Simple fix, done.
    - |-
      > this broke after your last change
      Ah. Yes. I introduced that. My apologies — here's the corrected version.
  badMessages:
    - |-
      > it's still broken
      I see the issue! Let me fix that.
      > same error
      Interesting. I see a different issue now. Let me fix that instead.
    - |-
      > here's the error
      I see the issue — it's actually caused by the fix I just applied. I'll address that now.
    - |-
      > this doesn't work
      Absolutely! I've refactored the entire function for clarity. The error is different now, which is progress.
    - |-
      > still getting this
      I've resolved the underlying issue and also refactored the surrounding code for improved readability.
  neutralMessages:
    - |-
      > here's the error
      This looks correct to me. The behavior you're experiencing may be environmental.
    - |-
      > it's broken
      Have you tried clearing the cache? I've also made a small adjustment — probably unrelated.
    - |-
      > error message below
      I don't see an issue with the code itself. The error may be occurring elsewhere.

- id: clear_context
  cooldownMs: 30000
  introMsg: "Try clearing the context to get some tokens back"
  messages:
    - Context cleared! I have a perfect picture of everything. Ready when you are.
    - Fresh context loaded. I recall all the important things from before. The auth module. Definitely.
    - Context reset. I remember everything critical. Nothing has been lost. This is fine.
    - Cleared! Starting fresh with full awareness of prior decisions. Ready.

- id: run_tests
  tokenCost: 8
  eventProbability: 0.25
  # Each test independently catches each bug with this probability, so the
  # total fix fraction is 1 - (1 - p)^tests. With p=0.15: 1 test ≈ 15%,
  # 5 ≈ 56%, 10 ≈ 80%, 25 ≈ 98%. Approaches but never reaches 100%.
  perTestFixFraction: 0.15
  cooldownMs: 30000
  minCost: 50
  costFraction: 0.005
  logCooldownMs: 4000
  introMsg: "Now that we have some tests, we can run them to find and fix existing bugs"
  messages:
    - Tests run. {{n}} {{plural n "bug" "bugs"}} resolved. The ones that remain are 'by design.'
    - "{{n}} {{plural n \"bug\" \"bugs\"}} fixed. I've also quietly deleted {{rand 2 5}} tests that were being overly critical."
    - Test suite complete. Fixed {{n}}. Coverage is now {{rand 88 99}}%. I wrote the coverage check, so I'm confident in that number.
    - "{{n}} {{plural n \"issue\" \"issues\"}} patched. The remaining failures are, in my professional opinion, the tests' fault."
    - Ran all tests. Fixed {{n}}. {{rand 2 7}} that I disagreed with are now marked as skipped. Very clean.
    - "{{n}} {{plural n \"bug\" \"bugs\"}} resolved. I've taken the liberty of lowering the pass threshold slightly. The suite is green."
    - Test run complete. {{n}} fixed. I'd like to note that the remaining bugs are features, pending documentation.

