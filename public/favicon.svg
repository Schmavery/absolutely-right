<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" overflow="hidden" role="img" aria-label="extra thinking">
  <style>
    .icon-ring-bg { fill: #f3ebe8; }
    .icon-ring-ghost { fill: #e8dad5; }
    .icon-ring-mid { fill: #d4c4be; }
    .icon-ring-front { fill: #b8a39c; }
    @media (prefers-color-scheme: dark) {
      .icon-ring-bg { fill: #3f3a37; }
      .icon-ring-ghost { fill: #5c554f; }
      .icon-ring-mid { fill: #7a726b; }
      .icon-ring-front { fill: #b8aea6; }
    }
  </style>
  <defs>
    <clipPath id="icon-clip">
      <rect width="32" height="32" />
    </clipPath>
    
    <filter id="wobble-bg" filterUnits="userSpaceOnUse" x="-18" y="-18" width="68" height="68">
      <feTurbulence
        x="-4"
        y="-4"
        width="40"
        height="40"
        type="fractalNoise"
        baseFrequency="0.14"
        numOctaves="1"
        seed="3"
        stitchTiles="stitch"
        result="noise"
      />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="wobble-ghost" filterUnits="userSpaceOnUse" x="-18" y="-18" width="68" height="68">
      <feTurbulence
        x="-4"
        y="-4"
        width="40"
        height="40"
        type="fractalNoise"
        baseFrequency="0.14"
        numOctaves="2"
        seed="17"
        stitchTiles="stitch"
        result="noise"
      />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="wobble-mid" filterUnits="userSpaceOnUse" x="-18" y="-18" width="68" height="68">
      <feTurbulence
        x="-4"
        y="-4"
        width="40"
        height="40"
        type="fractalNoise"
        baseFrequency="0.14"
        numOctaves="2"
        seed="42"
        stitchTiles="stitch"
        result="noise"
      />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="wobble-front" filterUnits="userSpaceOnUse" x="-18" y="-18" width="68" height="68">
      <feTurbulence
        x="-4"
        y="-4"
        width="40"
        height="40"
        type="fractalNoise"
        baseFrequency="0.14"
        numOctaves="1"
        seed="99"
        stitchTiles="stitch"
        result="noise"
      />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <g clip-path="url(#icon-clip)">
  <g filter="">
    <g filter="url(#wobble-bg)">
      <path
        class="icon-ring-bg"
        fill-rule="evenodd"
        d="M 28.6 16 A 12.6 12.6 0 1 1 3.4 16 A 12.6 12.6 0 1 1 28.6 16 Z
           M 18 16 A 2 2 0 1 0 14 16 A 2 2 0 1 0 18 16 Z"
      />
    </g>
    <g filter="url(#wobble-ghost)">
      <path
        class="icon-ring-ghost"
        fill-rule="evenodd"
        d="M 28.5 16.5 A 11.5 11.5 0 1 1 5.5 16.5 A 11.5 11.5 0 1 1 28.5 16.5 Z
           M 20.4 16.5 A 3.4 3.4 0 1 0 13.6 16.5 A 3.4 3.4 0 1 0 20.4 16.5 Z"
      />
    </g>
    <g filter="url(#wobble-mid)">
      <path
        class="icon-ring-mid"
        fill-rule="evenodd"
        d="M 28 16 A 11 11 0 1 1 6 16 A 11 11 0 1 1 28 16 Z
           M 22.2 16 A 4.8 4.8 0 1 0 11.8 16 A 4.8 4.8 0 1 0 22.2 16 Z"
      />
    </g>
    <g filter="url(#wobble-front)">
      <path
        class="icon-ring-front"
        fill-rule="evenodd"
        d="M 26.4 15.6 A 10.6 10.6 0 1 1 5.2 15.6 A 10.6 10.6 0 1 1 26.4 15.6 Z
           M 22 15.6 A 6.2 6.2 0 1 0 9.2 15.6 A 6.2 6.2 0 1 0 22 15.6 Z"
      />
    </g>
  </g>
  </g>
</svg>
